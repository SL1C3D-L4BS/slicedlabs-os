# SlicedLabs Agent Team — single source of truth for role metadata.
#
# `bin/render-prompts` reads this file plus the role bodies under
# `prompts/roles/<name>.md`, prepends the brand+personal voice prefixes,
# and writes the Claude Code subagent files at
# `claude-agents/.claude/agents/<name>.md` (which stows to `~/.claude/agents/`).
#
# Schema is intentionally narrow — anything not represented here is the role
# body's responsibility (in `prompts/roles/<name>.md`).
#
# Updating a role:
#   1. Edit prompts/roles/<name>.md (the body) and/or this manifest.
#   2. Run `render-prompts` (or git commit — the prompt-CI hook runs it).
#   3. The generated .claude/agents/<name>.md changes.

[meta]
schema_version = 1
voice_prefixes = ["prompts/voice/brand.md", "prompts/voice/personal.md"]

# Default cost cap per task (overrideable per role).
default_per_task_usd_cap = 1.00

# ===========================================================================
# Roster (13 roles)
# ===========================================================================

