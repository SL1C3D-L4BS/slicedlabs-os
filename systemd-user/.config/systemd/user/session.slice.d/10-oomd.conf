# Protect the graphical session: niri + quickshell (the Cockpit HUD) live in
# session.slice. `avoid` tells systemd-oomd to spare this subtree unless there
# is no other candidate — so under memory pressure oomd kills a hog in app.slice
# or the container slices, never the compositor (the "a hog dies, never the
# cockpit" rule from the plan / Performance Doctrine).
[Slice]
ManagedOOMPreference=avoid
