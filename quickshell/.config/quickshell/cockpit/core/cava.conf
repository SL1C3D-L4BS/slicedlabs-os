# SlicedLabs · body · © 2026 SlicedLabs
# Cockpit Reactor audio feed — cava in raw ascii mode → stdout, parsed by Cava.qml.
[general]
mode = normal
framerate = 30
bars = 10

[input]
method = pipewire
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
channels = mono
