critical  = "󰀪"
building  = "󱥸"
spinner   = "⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏"   # braille frames; scripts index one per tick

# Tab identities — workspace tabs (1-7) + overlay HUD tabs (8-11)
engine     = "󰒋"
comms      = "󰭹"
research   = "󰂽"
control    = "󰕮"
stream     = "󰕧"
streaming  = "󰕧"
monitoring = "󰓅"
gaming     = "󰊴"
coding     = "󰨸"
browser    = "󰈹"
media      = "󰎆"
net        = "󰛳"
ai         = "󰚩"
agenda     = "󰃭"
market     = "󰟇"   # SlicedLabs Marketplace (nf-md-store) — the layer users pull from

# Shared metric glyphs — used across module scripts
