secondary   = "64A8E5"
tertiary    = "D9892B"
error       = "D95C5C"
success     = "C7D42B"
# identity ramp (bare hex = OKLCH ramp baked by color.py; keep in sync via render)
coding      = "378ADD"
research    = "7F77DD"
engine      = "D85A30"
browser     = "1D9E75"
monitoring  = "639922"
streaming   = "D4537E"
gaming      = "E24B4A"
media       = "BA7517"
selection   = "1A3D6F"
inactive    = "3D3528"
