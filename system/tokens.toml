# ===========================================================================
# MOTION — three tiers + one easing curve
# ===========================================================================

[motion]
quick_ms    = 120         # micro: hover, click flash
normal_ms   = 200         # state: tab switch, workspace activate, chip recolor
slow_ms     = 380         # scene: overview, modal, lockscreen
pulse_ms    = 2400        # living-state breathing period (live / rec / critical)
lift_ms     = 120         # hover-lift micro-interaction (= quick)
ease        = "cubic-bezier(0.2, 0.8, 0.2, 1.0)"   # fast-out, soft-in

[spring]
# Niri tactile-animation springs. damping<1 oscillates; 0.85-0.95 is polished
# settle. stiffness = spring constant (higher = snappier). epsilon = rest
# threshold (smaller = longer tail).
overview_damping      = 0.95
overview_stiffness    = 600
overview_epsilon      = 0.0001
window_open_damping   = 0.85
window_open_stiffness = 500
window_open_epsilon   = 0.001

# ===========================================================================
# GEOMETRY — 8pt grid; every Waybar value = f(bar_height=32)
# ===========================================================================

[geom]
unit            = 4          # half-step atom — never below
gap             = 8          # default module gap (= 2 units)
gap_lg          = 16         # group separation (cpu/mem/temp cluster ↔ network)
gap_xl          = 24         # sectional break

bar_height          = 40     # 5 × grid — default; accommodates 14px bold tab headers
bar_height_compact  = 32     # 4 × grid — compact alt (requires 11px tab headers)
chip_height         = 32     # bar_height − 2 × 4px margin
bar_reserve         = 56     # gap + bar_height + gap — window TOPS sit one gap BELOW the
                             # pills (pill spans y=[gap, gap+bar_height]=[8,48]; windows
                             # start at 56). Symmetric 8px rhythm. niri top strut SSOT.

# RETIRED 2026-05-29: left_reserve / bar_center cap-centering tokens.
# They forced .modules-left to min-width:1120, but modules-center is a GTK
# center-widget whose usable width is (bar − 2×left) — so a 1120px reserve
# clipped the centre to ~320px and made EVERY tab cluster invisible. The bar now
# centers the active tab's fused pill as a group (no reserve, no per-cap lead).
# Do not reintroduce a modules-left min-width. See render-waybar + style.css.tmpl.

pad_y           = 2          # half-unit — vertical chip padding
pad_x           = 12         # 3 units — horizontal module chip padding
pad_x_lg        = 16         # 4 units — tab-header pill horizontal padding

radius_sm       = 4          # tight UI elements
radius          = 6          # default chip rounding (half of pad_x)
radius_lg       = 12         # large elements, modal corners
radius_window   = 14         # Niri window corners

border          = 2          # half-unit — accent border, separator
border_lg       = 4          # emphasized state, focus ring

# ===========================================================================
# OPACITY — 0.0 transparent → 1.0 opaque
# ===========================================================================

[opacity]
# Uniform + transparent so a window stays FROSTED GLASS whether focused or not —
# focus is signalled by the gradient ring + shadow, never by greying/solidifying.
window_focused    = 0.85     # frosted; was 0.98 (near-opaque → looked grey when active)
window_unfocused  = 0.85     # same as focused — focus change never greys a window
window_floating   = 0.88     # floating/TUI: a touch more present, still clearly frosted
ghostty_bg        = 0.88     # terminal background through transparency
ghostty_inactive  = 0.78     # unfocused ghostty splits — sharper focus signal
overlay           = 0.85     # mako, wofi backdrop
launcher          = 0.88     # wofi window itself
overview_backdrop = 0.92     # niri overview backdrop

# ===========================================================================
# SHADOW + BLUR (Niri renders shadows in screen-space; values in logical px)
# ===========================================================================

[shadow]
softness_md   = 24
softness_lg   = 40
softness_xl   = 64           # floating + overview workspaces (lifted feel)
spread_md     = 0
spread_lg     = 4
spread_xl     = 8
offset_y      = 6
offset_y_xl   = 14           # exaggerated drop for floating windows

[blur]
backdrop_md   = 12           # ghostty background-blur-radius (KWin portability)
backdrop_lg   = 20
# Niri 26.04 native blur (dual-kawase). Applied where a window/layer rule sets
# background-effect{blur true}; tuned LIGHT (passes=2) for a frosted, not heavy,
# transition. `niri-wm.github.io/niri/Configuration:-Miscellaneous` for ranges.
passes        = 2            # downsample/upsample iterations (3 = niri default)
offset        = 3            # per-pass pixel offset
noise         = 0.02         # anti-banding overlay
saturation    = 1.2          # blurred-bg saturation (1.5 default → muted for nature palette)

# ===========================================================================
# GLASS — Apple "Liquid Glass" as a quantified material. Procedural lensing /
# specular / rim / chromatic, composited OVER niri's real dual-kawase blur and
# refracting the current wallpaper (~/.cache/engine-backdrop.png). RX-580 budgeted.
# Grounded: RealTimeRendering §9.5 (Fresnel rim), TheBookofShaders §3.3 (rounded-
# rect SDF) / §3.1.1 (smoothstep edges) / §4.9 (fbm). Apple law: chrome-only, no
# glass-on-glass, mandatory reduce-transparency/motion, variants → quality tiers.
# ===========================================================================

[glass]
quality             = "high"  # high | low | off  (off ⇒ flat frosted = today's cssChip)
look                = "dark"  # dark | light | clear — the material look (Liquid Retina v3);
                              # clear overlays [glass_clear]/[opacity_clear] at render time
refraction_px       = 6       # real edge lensing on the always-on chrome (v3: was 2)
rim_width           = 1.25    # grazing-light rim (v3: was 1.0 hairline)
rim_opacity         = 0.18    # v3: was 0.14
specular_intensity  = 0.12    # gentle STATIC top sheen (v3: was 0.0 flat) — speed stays 0 on bars
specular_speed      = 0.0     # 0 = no motion on base chrome; the sweep is a focal/ultra trait
chromatic_px        = 0.6     # sub-pixel rim aberration (v3: was 0.0)
ambient_bleed       = 0.12    # active brand-hue tint (v3: was 0.10)
tint_opacity        = 0.82    # slightly clearer body (v3: was 0.85)
rim_brand_mix       = 0.35    # v3: rim light picks up the brand hue (0 = pure white rim)
corner_continuous   = 1       # 1 = squircle (continuous) corners
noise               = 0.02    # == blur.noise (anti-banding)
reduce_transparency = 0       # a11y: 1 ⇒ force opaque frost + drop refraction
reduce_motion       = 0       # a11y: 1 ⇒ freeze specular / breathing
contrast_floor      = 4.5     # WCAG-AA min text contrast the material must never break

# FOCAL surfaces (menu · Marketplace · secondary panels) get TRUE Liquid Glass:
# stronger wallpaper lensing + a slow moving specular sweep + a subtle chromatic
# rim, composited over niri's real blur. The always-on bars keep the calm-but-
# liquid baseline above — you read text through them all day.
focal_refraction_px      = 10
focal_rim_opacity        = 0.22
focal_specular_intensity = 0.42
focal_specular_speed     = 0.6
focal_chromatic_px       = 1.4
focal_ambient_bleed      = 0.14

# ULTRA tier (v3) — the showpiece material for Stack modals · Control Center ·
# permission gates · lock chrome: strongest lensing, visible chromatic edge,
# slow liquid sweep. Glass.qml `tier: "ultra"` opts in; reduce_transparency /
# reduce_motion still flatten/freeze it (the a11y law outranks the showpiece).
ultra_refraction_px      = 14
ultra_rim_opacity        = 0.30
ultra_specular_intensity = 0.55
ultra_specular_speed     = 0.35
ultra_chromatic_px       = 2.2
ultra_ambient_bleed      = 0.18

# Per-cockpit glass quality (spec §14 tiers) — frame-time protection. The opaque /
# perf-sensitive workspaces drop to a cheaper shader path; the glass workspaces keep
# the full Liquid-Glass material. Read by Glass.qml via Theme.glassQualityFor(Niri.focused);
# unlisted workspaces fall back to [glass].quality above. (off | low | medium | high)
[glass.per_workspace]
coding     = "medium"
research   = "medium"
engine     = "low"      # Kanso build/run/profile — protect frame-time
browser    = "medium"
monitoring = "medium"
streaming  = "low"      # capture path — keep the GPU for the encoder
gaming     = "low"      # opaque, low
media      = "low"      # opaque video

[glass_light]
ambient_bleed = 0.12
rim_opacity   = 0.25

# CLEAR look (v3) — the see-through Liquid Retina variant: thinner tint, more
# wallpaper, calmer bleed. Overlaid onto [glass] when [glass].look = "clear"
# (render-templates / render-quickshell --look=clear).
[glass_clear]
tint_opacity   = 0.55
refraction_px  = 8
ambient_bleed  = 0.06
rim_opacity    = 0.22

# Opacity companions for the clear look — windows let more wallpaper through.
[opacity_clear]
window_focused   = 0.78
window_unfocused = 0.78
window_floating  = 0.82
ghostty_bg       = 0.80

# ===========================================================================
# SEMANTIC ROLE TIER — the design-concept's role tokens. Every render target
# (Cockpit QML, Console .tcss, Warden UI, docs CSS) binds to these ROLES, never
# to raw hues — that's what `verify-design-language` enforces. Values are derived
# from [color] (duplicated as literals like [ansi], so renames don't cascade).
# Roles: bg/text/border × elevation, plus danger/info status.
# ===========================================================================

[semantic]
bg_primary      = "#1E1E1E"   # = bg          — base, cards, workspace tiles
bg_secondary    = "#2B2B2B"   # = bg_alt      — containers, panels
bg_tertiary     = "#3A3A3A"   # = bg_alt_light— chips / pills
bg_danger       = "#3A2222"   # dark coral surface — suspended badge
text_primary    = "#F7F6F2"   # = fg          — primary text, emphasized values
text_secondary  = "#B8A789"   # = fg_muted    — default pill / label text
text_tertiary   = "#8A8175"   # dim sand-gray — captions, the WS number
text_danger     = "#E58B8B"   # light coral   — on bg_danger
text_info       = "#8FBEEA"   # light sky     — info / hint text
border_tertiary = "#454545"   # hairline (rendered 0.5px) — chips, cards
border_info     = "#64A8E5"   # = secondary   — generic active-accent border

[semantic_light]
bg_primary      = "#F7F6F2"
bg_secondary    = "#EFE9DD"
bg_tertiary     = "#E2D9C5"
bg_danger       = "#F3DADA"
text_primary    = "#1E1E1E"
text_secondary  = "#7A6142"
text_tertiary   = "#9A8C76"
text_danger     = "#B74A4A"
text_info       = "#1F4F92"
border_tertiary = "#D8CFBC"
border_info     = "#3F8AC8"

# ===========================================================================
# COCKPIT — shell-specific knobs the GPU bar reads (pager + emphasis), so the
# capitalized-tab choice and the concept's medium-weight feel are token-driven.
# ===========================================================================

[cockpit]
workspace_label_case = "upper"   # upper | title | small_caps | lower (concept = lowercase)
pager_dot            = 8         # identity-dot diameter px
pager_active_border  = 2         # focused-tab accent border px (concept)
pill_hairline        = 1         # chrome border px (drawn 0.5 via AA where supported)

# ===========================================================================
# MODAL — the SlicedLabs userspace modal design language (one ModalShell per popup).
# ONE ModalShell.qml consumes these; EVERY popup wears them — Control Center, Keys,
# the command palette, notifications, and hermes. Numbers only here; colours come
# from [semantic]/[color] (approve = success, deny = error). Doctrine + anatomy:
# library/codex/20-architect/modal-design-language.md  (Canon §III.7, §VIII.17).
# ===========================================================================

[modal]
radius          = 16      # the floating-pill corner (softer than radius_lg=12)
pad             = 20      # inner content padding (5 × grid)
gap             = 12      # intra-modal element gap (3 × grid)
width_sm        = 520     # compact — palette, confirms, hermes ask
width           = 640     # default — Control Center, chat
width_lg        = 820     # wide — Keys browser, history, results
max_height_frac = 0.82    # cap panel height to this fraction of the screen height
header_height   = 40      # title row
tab_height      = 36      # TabStrip
input_height    = 42      # InputBar
row_height      = 32      # list rows (history, results, devices)
enter_scale     = 0.96    # entrance: rise 96%→100% (calmer than the old 0.93)
backdrop_dim    = 0.55    # scrim opacity over the desktop behind the pill
hairline        = 0.08    # white-alpha divider / hairline border (matches existing modals)
fill_subtle     = 0.04    # row / chip subtle fill
fill_hover      = 0.12    # hover fill

# ===========================================================================
# ANSI 8-COLOR PALETTE (zellij theme, ghostty theme)
# Kept separate from semantic colors so renames don't cascade.
# ===========================================================================

[ansi]
black       = "#2B2B2B"   # Soft Black
red         = "#D95C5C"   # Coral Red
green       = "#C7D42B"   # Lime Green
yellow      = "#D9892B"   # Golden Orange
blue        = "#2961B1"   # Royal Blue
magenta     = "#7C6ED6"   # Wisteria
cyan        = "#64A8E5"   # Sky Blue
white       = "#F7F6F2"   # Soft White

# ===========================================================================
# ANSI BRIGHT 8 — completes the 16-color set (ghostty palette 8-15, zellij).
# Palette-consistent luminance lifts of the [ansi] hues so brights stay on-brand.
# Placeholder grammar (v3): [a-z_][a-z0-9_]* — digits allowed (ramp steps);
# these keys stay spelled-out for readability.
# ===========================================================================

[ansi_bright]
bright_black   = "#3A3A3A"   # Mid Charcoal (bg_alt_light) — standard bright-black
bright_red     = "#E87C7C"   # Coral lifted
bright_green   = "#DCE85A"   # Lime lifted
bright_yellow  = "#E8A54E"   # Golden lifted
bright_blue    = "#4F84CC"   # Royal lifted (distinct from bright_cyan)
bright_magenta = "#9B8FE0"   # Wisteria lifted
bright_cyan    = "#8FCBEC"   # Sky lifted
bright_white   = "#FFFFFF"   # Pure white above Soft White

# ===========================================================================
# POWERLINE — the capsule/segment SHAPE, one source. Nerd-Font powerline glyphs
# (JetBrainsMono Nerd Font) so zjstatus tabs, the tide prompt, lualine sections,
# and the cockpit pills all draw the SAME pill. Rounded caps = the Liquid-Glass
# capsule; chevrons = hard segment joins; thin = hairline dividers. Mirrors the
# `~/Downloads/slicedlabs-terminal-surface.html` pill atom. Keys: [a-z_][a-z0-9_]*.
# ===========================================================================

[powerline]
round_left   = ""     # U+E0B6  capsule left cap  (pill start)
round_right  = ""     # U+E0B4  capsule right cap (pill end)
sep_left     = ""     # U+E0B0  hard chevron ›  (left-aligned segment join)
sep_right    = ""     # U+E0B2  hard chevron ‹  (right-aligned segment join)
thin_left    = ""     # U+E0B1  hairline divider › (matches the cockpit hairline)
thin_right   = ""     # U+E0B3  hairline divider ‹
dot          = "●"     # identity pager dot (== cockpit pager_dot diameter)

# ===========================================================================
# TERMINAL — tooling knobs the pill cascade reads (extends [cockpit]). The
# whole terminal stack speaks the desktop language; these are its few dials.
# ===========================================================================

[terminal]
claude_pane_pct = 30         # Claude Code right-pane width in the default zellij layout (slim · 2026-06-03)
zjstatus_height = 1          # status/tab bar rows (single-row, calm)
pill_weight     = "medium"   # weight-500 restraint, carried from the cockpit pills

# ===========================================================================
# LAYOUT — cockpit pane proportions (the spatial SSOT). Golden-ratio rhythm; the
# zellij deck .tmpl files reference these so every cockpit breathes on ONE scale.
# Tune here + re-render — never hardcode a pane ratio in a layout again.
# ===========================================================================
[layout]
phi_major     = 62           # golden 2-pane split — primary (editor/content)
phi_minor     = 38           # golden 2-pane split — secondary (preview/assistant)
editor_major  = 66           # dominant editor in a deck's top row
rail          = 12           # slim nav rail (Tree/Git/Run · Bacon)
aux_slim      = 11           # slim AI / assistant column
deck_top      = 78           # deck editor-row height
console_h     = 22           # full-width console strip height (= 100 − deck_top)
