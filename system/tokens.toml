# ===========================================================================
# TYPOGRAPHY — modular scale, ratio 1.5 (perfect fifth)
# Base UI = 14px; mono = 16px; tab-header = 18px; heading = 20px; display = 30px  (Comfortable, 2026-06-03)
# ===========================================================================

[font]
mono        = "JetBrainsMono Nerd Font"
mono_size   = 16
display     = "Geist Mono"
ui_size     = 14
ui_size_sm  = 11         # tooltips, captions, sub-labels
ui_size_lg  = 18         # Waybar tab headers (bold)
heading_md  = 20         # section headings in editors/launchers
display_lg  = 30         # lockscreen, splash (reserved)

# Weight tiers — Geist Mono axis (Light→Black). Hierarchy rides WEIGHT, not colour.
weight_dim      = 300    # inactive tab names / de-emphasis (Light)
weight_metric   = 400    # metric values (Regular)
weight_emphasis = 500    # concept emphasis — value text, active pager (Medium)
weight_label    = 600    # labels, clock (SemiBold)
weight_active   = 700    # active tab name (Bold) — legacy strong

# ===========================================================================
# ICONOGRAPHY — Nerd Font glyph vocabulary, promoted to law so CSS, bash, and
# Niri all bind to one source. Rendered into scripts/lib/glyphs.sh (bash) and
# referenced in templates as {{icon.key}}. Glyphs are JetBrainsMono Nerd Font
# (Material Design Icon range) unless they are plain Unicode.
# ===========================================================================

[icon]
# State vocabulary — mirrors the .empty/.ok/.info/.alert/.critical CSS classes
