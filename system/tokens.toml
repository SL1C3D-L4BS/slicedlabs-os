[color_rgba]
shadow_dim         = "#00000080"               # 50% black — baseline window shadow
shadow_softer      = "#00000040"               # 25% black — inactive-window shadow
shadow_primary     = "#2961B1a0"               # Royal Blue 63% — focused-window tint
shadow_lifted      = "#2961B1d0"               # Royal Blue 81% — floating + overview
shadow_tertiary    = "#D9892B80"               # Golden Orange 50% — stream/creator
