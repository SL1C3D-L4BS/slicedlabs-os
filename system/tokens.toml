# Single source of truth for design tokens across the workstation.
# Nature-inspired palette · perfect-fifth modular scale (1.5) · 8pt grid.
#
# Every color, font, motion, and spacing value lives here. Config files
# under ~/.dotfiles/<package>/ are templates (`.tmpl`) that reference
# `{{section.key}}` placeholders; `~/.dotfiles/bin/.local/bin/render-templates`
# substitutes from this file at deploy time. Pass `--variant=light` to use
# the [color_light] / [color_raw_light] / etc. blocks instead of the dark
# defaults; templates need no changes for variant support.
#
# Workspace identities cascade everywhere (Waybar tab headers, Niri focus
# rings, MangoHud, Starship). Hue story: cool blues for work (engine,
# comms) → warm triad for signaling (stream, monitoring, gaming).

# ===========================================================================
# COLOR — DARK VARIANT (default)
# ===========================================================================

[color]
# Base layers
bg            = "#1E1E1E"   # Charcoal Black — deep base
bg_alt        = "#2B2B2B"   # Soft Black — chip surfaces, panels
bg_alt_light  = "#3A3A3A"   # Mid Charcoal — lighter container surfaces (workspaces pill)
fg            = "#F7F6F2"   # Soft White — primary text
fg_muted      = "#B8A789"   # Weathered Sand — muted text (Sand Beige desaturated)

# Global accent + status triad — used by niri rings, starship, mangohud, the
# [ansi] terminal palette, and the [color_rgba] shadows. Identity is a SEPARATE
# ramp below: STATUS ≠ IDENTITY (the design-concept separation).
primary     = "#2961B1"   # Royal Blue — global accent / focus
secondary   = "#64A8E5"   # Sky Blue — secondary accent / info
tertiary    = "#D9892B"   # Golden Orange — tertiary accent
error       = "#D95C5C"   # Coral Red — danger / critical status
success     = "#C7D42B"   # Lime Green — success status

# Workspace identity ramp — OKLCH, lightness L≈0.622 held EVEN across all eight
# hues (the perceptual payoff: equal-weight dots, distinct hue). These are the
# cockpit pager dots/tabs and cascade to focus rings + scenes. Anchors come from
# the design concept; `color.py --selftest` guarantees the exact sRGB bake.
coding      = "oklch(0.62325 0.14864 251.503)"   # #378ADD blue    — WS1
research    = "oklch(0.62320 0.15015 284.719)"   # #7F77DD violet  — WS2
engine      = "oklch(0.62271 0.16827 38.262)"    # #D85A30 coral   — WS3
browser     = "oklch(0.62306 0.12317 165.499)"   # #1D9E75 teal    — WS4
monitoring  = "oklch(0.62227 0.15627 131.487)"   # #639922 green   — WS5
streaming   = "oklch(0.62245 0.16662 2.522)"     # #D4537E magenta — WS6
gaming      = "oklch(0.62339 0.18772 24.724)"    # #E24B4A red     — WS7
media       = "oklch(0.62218 0.13039 67.215)"    # #BA7517 amber   — WS8

# Overlay HUD-tab identities — summoned by keybind, not workspaces (violet slot
# now belongs to research; these fill teal / orchid / rose).
net         = "#2FA39A"   # Seafoam Teal — network/VPN/sec HUD
ai          = "#C264B0"   # Orchid — AI/spend HUD
agenda      = "#D98AAE"   # Rose — agenda/standup HUD

# Surface modifiers
selection   = "#1A3D6F"   # Deep Ocean — primary-darkened selection backdrop
inactive    = "#3D3528"   # Earth Brown deep — inactive borders, disabled UI
warm_shadow = "#1A1612"   # Warm undertone — overlay tints, low-urgency notify bg
overlay     = "rgba(30, 30, 30, 0.85)"

# Extended palette (additional brand colors, opt-in)
mist        = "#BED7F4"   # Mist Blue — info hint, hover highlight, sparkle
sand        = "#D3C399"   # Sand Beige — warm tooltip surface
earth       = "#7A6142"   # Earth Brown — heavy borders, separators
wisteria    = "#7C6ED6"   # Wisteria — special-state accent (profiling, heaptrack)
honey       = "#D6BF3A"   # Warm Honey — caution tier (pre-alert)
brick       = "#8E3A32"   # Deep Brick — critical tier (above coral)

[color_css]
backdrop      = "rgba(30, 30, 30, 0.85)"      # bg @ 85% — Waybar/Mako overlay
bg_alt_soft   = "rgba(43, 43, 43, 0.78)"      # bg_alt @ 78% — chip surfaces
chip          = "rgba(43, 43, 43, 0.85)"      # bg_alt @ 85% — opaque-feeling chip
overlay_dim   = "rgba(0, 0, 0, 0.6)"          # modal scrim
# Waybar/GTK living-state box-shadow glows (rgba — GTK rejects 8-digit hex).
shadow_dim    = "rgba(0, 0, 0, 0.5)"          # hover-lift drop shadow
glow_build    = "rgba(100, 168, 229, 0.40)"   # Sky — build in progress
glow_rec      = "rgba(217, 137, 43, 0.50)"    # Golden — recording
glow_live     = "rgba(217, 92, 92, 0.50)"     # Coral — live / streaming
glow_urgent   = "rgba(217, 137, 43, 0.69)"    # Golden — urgency takeover

