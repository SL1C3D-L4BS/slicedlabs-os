# Gaming-tier limits.
# nofile  — large game asset bundles open many handles.
# memlock — anti-cheat + JIT engines lock pages.
# nice    — GameMode group can renegotiate priority.
# rtprio  — GameMode soft-realtime hint + PipeWire-RT.
*               soft    nofile          524288
*               hard    nofile          1048576
*               soft    memlock         unlimited
*               hard    memlock         unlimited
@gamemode       -       nice            -10
@gamemode       -       rtprio          20
