# GameMode profile — performance + AMD GPU upshift while a game runs.
# Restores defaults on game exit.

[general]
renice=10
desiredgov=performance
defaultgov=powersave
softrealtime=auto
ioprio=0
inhibit_screensaver=1

[gpu]
apply_gpu_optimisations=accept-responsibility
gpu_device=0
amd_performance_level=high

[cpu]
park_cores=no
pin_cores=no

[custom]
start=notify-send "GameMode" "Performance profile active"
end=notify-send "GameMode" "Back to powersave"
