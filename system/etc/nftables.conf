#!/usr/bin/nft -f
# [ENGINE] platform — workstation firewall (spec XVIII.13 · Tier 2)
# Default-drop input, structured as named subchains (Tier-2 refactor):
#   trusted_ifaces — loopback + the tailnet
#   svc_inbound    — the only advertised UDP services (tailscale P2P, wireguard)
#   icmp_ok        — ICMP/ICMPv6 (PMTUD, ping)
#   log_drop       — rate-limited audit trail of everything refused
# The pyroscope mesh (4040/9095/7946) is loopback/tailnet-only: its components
# are pinned to 127.0.0.1 in /etc/pyroscope/config.yml AND explicitly guarded
# here so the Tier-2 intent survives a config regression. sshd is intentionally
# off, so no port 22 rule. Tracked in dotfiles → installed to /etc by the
# bootstrap system-hardening layer (never hand-edit /etc/nftables.conf).
flush ruleset

table inet filter {
    chain trusted_ifaces {
        iifname "lo" accept
        iifname "tailscale0" accept comment "trust tailnet"
    }

    chain svc_inbound {
        udp dport 41641 accept comment "tailscale direct p2p"
        udp dport 51820 accept comment "wireguard"
    }

    chain icmp_ok {
        ip6 nexthdr icmpv6 accept
        ip protocol icmp accept
    }

    chain log_drop {
        # Rate-limited so the journal stays calm; the prefix keys lnav/loki.
        limit rate 6/minute burst 12 packets log prefix "nft-drop " level info
        reject with icmpx type port-unreachable
    }

    chain input {
        type filter hook input priority 0; policy drop;
        ct state established,related accept
        ct state invalid drop
        jump trusted_ifaces
        jump svc_inbound
        jump icmp_ok
        # Tier-2 explicit guard: the pyroscope microservice mesh never answers
        # off-box (redundant under default-drop; documents + survives intent).
        tcp dport { 4040, 9095, 7946 } counter drop comment "pyroscope mesh: loopback/tailnet only"
        udp dport 7946 counter drop comment "pyroscope memberlist: loopback/tailnet only"
        jump log_drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
