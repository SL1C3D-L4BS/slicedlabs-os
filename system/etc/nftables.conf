#!/usr/bin/nft -f
# [ENGINE] platform — workstation firewall (spec XVIII.13)
# Default-drop input. Trusts loopback + the tailnet (tailscale0) + WireGuard.
# The tailscale0 trust + udp/41641 keep the tailnet able to reach this host on
# fast direct P2P; without them, default-drop forces tailscale onto slower DERP
# relay and blocks inbound tailnet connections. sshd is intentionally off, so no
# port 22 rule. Tracked in dotfiles → installed to /etc by the bootstrap
# system-hardening layer (never hand-edit /etc/nftables.conf directly).
flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        ct state established,related accept
        ct state invalid drop
        iifname "lo" accept
        iifname "tailscale0" accept comment "trust tailnet"
        udp dport 41641 accept comment "tailscale direct p2p"
        udp dport 51820 accept comment "wireguard"
        ip6 nexthdr icmpv6 accept
        ip protocol icmp accept
        reject with icmpx type port-unreachable
    }
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
    chain output {
        type filter hook output priority 0; policy accept;
    }
}
