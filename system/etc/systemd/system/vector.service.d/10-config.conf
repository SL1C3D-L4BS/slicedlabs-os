# Pin Vector to the dotfiles config (journald -> Loki); ignore the packaged
# demo /etc/vector/vector.yaml. validate uses --no-environment so a briefly-
# unready Loki can't block startup (sink healthchecks would otherwise fail).
[Service]
ExecStartPre=
ExecStartPre=/usr/bin/vector validate --no-environment /etc/vector/vector.toml
ExecStart=
ExecStart=/usr/bin/vector --config /etc/vector/vector.toml
