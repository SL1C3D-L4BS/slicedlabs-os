# Root-slice swap protection: when system swap exceeds the global SwapUsedLimit
# (oomd.conf.d/10-sliced.conf = 85%), oomd kills the cgroup using the most swap.
# Prevents the swap-exhaustion OOM cascade we hit (free swap was 136kB at the kill).
# Mirrors Fedora's default. NOTE: the valid key is ManagedOOMSwap (not …SwapUsedLimit).
[Slice]
ManagedOOMSwap=kill
