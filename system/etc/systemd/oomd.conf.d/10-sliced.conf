# SlicedLabs OS — systemd-oomd tuning (Track A / layer_S).
# Userspace OOM protection so a hog is killed under pressure BEFORE the kernel
# OOM-killer fires and takes out the compositor/cockpit (which is what happened:
# kernel killed a ghostty cockpit scope + a 3GB git when 4GB zram filled).
[OOM]
SwapUsedLimit=85%
DefaultMemoryPressureLimit=60%
DefaultMemoryPressureDurationSec=20s
