# SlicedLabs OS — zram swap (Track A / layer_S).
# Was a 4GB default that filled and triggered the kernel OOM-killer on the 31GB
# box. zstd compresses ~3-5:1, so ~15GB of zram costs only a few GB of real RAM
# and gives real headroom under the dev-stack + Firefox + AI-pane load.
[zram0]
zram-size = min(ram / 2, 16384)
compression-algorithm = zstd
swap-priority = 100
