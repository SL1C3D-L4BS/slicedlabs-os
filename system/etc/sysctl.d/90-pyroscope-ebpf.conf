# Lowered from the hardened default of 2 so the grafana-alloy eBPF profiler
# (which holds CAP_SYSLOG) can read /proc/kallsyms symbol addresses for
# kernel-stack symbolization. Unprivileged processes still see zeroed
# addresses. Pairs with grafana-alloy.service.d/10-ebpf-caps.conf.
# Set back to 2 (or delete this file) to fully revert.
kernel.kptr_restrict = 1
