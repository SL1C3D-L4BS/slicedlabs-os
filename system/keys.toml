# ===========================================================================
# SlicedLabs OS — KEYBINDING SSOT
# ===========================================================================
# Single source of truth for EVERY keybind across the system. Rendered by
# `bin/.local/bin/render-keys` into four artifacts (the cascade — never hand-edit
# the outputs):
#
#   1. niri binds   → managed region in niri/.config/niri/config.kdl.tmpl
#                     (phase 1b; then render-templates substitutes {{tokens}})
#   2. modal data   → quickshell/.config/quickshell/cockpit/generated/keys.json
#                     (the searchable Cockpit "Keys" modal, Mod+Alt+K)
#   3. cheatsheets  → docs/keys/<tool>.md  +  docs/keys/SYSTEM-KEYS.md
#   4. poster       → docs/keys/keyboard-poster.typ  (typst → SVG/PDF, graphed
#                     per modifier layer, keys tinted by destination hue)
#
# SCHEMA — a flat array of [[bind]] tables. One loop in render-keys; group by
# `tool` for cheatsheets/modal, by `layer` for the poster, filter `tool=="niri"`
# for binding generation.
#
#   tool      required  owning surface: niri | slicedlabs | ghostty | zellij |
#                       nvim | lazygit | rmpc | gh-dash | fish | media
#   key       required  canonical chord, niri notation (Mod = Super)
#   desc      required  human description (shown in modal/cheatsheet)
#   category  required  sub-group within the tool (Focus, Window, Workspace, …)
#   layer     required  modifier layer for the poster: Mod | Mod+Shift |
#                       Mod+Ctrl | Mod+Alt | Mod+Ctrl+Shift | Fn | Other
#   action    niri-only EXACT KDL action (no trailing ';'); render-keys wraps it
#   attrs     optional  niri key attributes, e.g. "allow-when-locked=true"
#   src       optional  "default" marks an upstream framework default (informational)
#
# Hue map for the poster (destination workspace/HUD identity, from tokens.toml):
#   coding=coding research=research engine=engine browser=browser monitoring=monitoring
#   streaming=streaming gaming=gaming media=media net=net ai=ai agenda=agenda
#   agenda=agenda
# ===========================================================================

[meta]
version = 1
mod = "Super"                       # niri "Mod" → the Super/Windows key
layers = ["Mod", "Mod+Shift", "Mod+Ctrl", "Mod+Alt", "Mod+Ctrl+Shift", "Fn", "Other"]
tools  = ["niri", "slicedlabs", "ghostty", "zellij", "nvim", "lazygit", "rmpc", "gh-dash", "fish", "media"]
# Gaming/app-launch *menu* actions (Steam/Lutris/…) are not chords — they live in
# docs/SYSTEM-MAP.md. Gaming *keys* are niri binds tagged category="Gaming".

# ===========================================================================
# niri — the compositor. This is the muscle-memory surface; transcribed verbatim
# from config.kdl.tmpl so phase-1b generation can reproduce it byte-for-byte.
# ===========================================================================

# ---- Launch ----------------------------------------------------------------
[[bind]]
tool = "niri"
key = "Mod+Return"
action = 'spawn "ghostty"'
desc = "Open a terminal (ghostty → zellij)"
category = "Launch"
layer = "Mod"

[[bind]]
tool = "niri"
key = "Mod+Space"
action = 'spawn "wofi" "--show" "drun"'
desc = "App launcher (wofi drun)"
category = "Launch"
layer = "Mod"

[[bind]]
tool = "niri"
key = "Mod+Alt+Space"
action = 'spawn "sh" "-c" "$HOME/.local/bin/sliced-menu"'
desc = "Command palette — all workstation actions"
category = "Launch"
layer = "Mod+Alt"

[[bind]]
tool = "niri"
key = "Mod+Alt+S"
action = 'spawn "ghostty" "--class=com.slicedlabs.tui" "-e" "slicedlabs"'
desc = "SlicedLabs mission-control TUI (floating)"
category = "Launch"
layer = "Mod+Alt"

[[bind]]
tool = "niri"
key = "Mod+Alt+E"
action = 'spawn "sh" "-c" "ghostty --working-directory=$HOME/Projects/engine"'
desc = "Open the [ENGINE] repo in a terminal"
category = "Launch"
layer = "Mod+Alt"

[[bind]]
tool = "niri"
key = "Mod+Alt+P"
action = 'spawn "ghostty" "--class=com.slicedlabs.music" "-e" "music"'
desc = "Music cockpit (mpd / rmpc · SomaFM radio)"
category = "Launch"
layer = "Mod+Alt"

