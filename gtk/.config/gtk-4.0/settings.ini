[Settings]
# Dark mode is sourced from the xdg-desktop-portal color-scheme (gsettings
# org.gnome.desktop.interface color-scheme=prefer-dark). The old
# gtk-application-prefer-dark-theme key is unsupported under libadwaita and
# emits a journal warning on every portal start — do not re-add it.
gtk-theme-name=Adwaita-dark
gtk-icon-theme-name=Tela-circle-purple-dark
gtk-cursor-theme-name=Bibata-Modern-Classic
gtk-cursor-theme-size=24
